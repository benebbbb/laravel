[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.ctype", "php82Extensions.fileinfo", "php82Extensions.openssl", "php82Extensions.curl", "php82Extensions.gd", "composer"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader"
]

[variables]
SESSION_DRIVER = "cookie"
APP_ENV = "production"
APP_DEBUG = "false"
CACHE_STORE = "array"
QUEUE_CONNECTION = "sync"
FILESYSTEM_DISK = "local"

[start]
cmd = "php artisan config:clear && php artisan cache:clear && php artisan migrate --force && php artisan storage:link --force 2>/dev/null; php -S 0.0.0.0:$PORT -t public"
